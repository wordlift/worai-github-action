name: "graph-sync"
description: "Graph Sync using worai by WordLift"
author: "WordLift"
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  profile:
    description: "Profile name defined in worai config"
    required: true
  config_path:
    description: "Optional path passed as --config to worai"
    required: false
    default: ""
  debug:
    description: "Enable --debug (true/false)"
    required: false
    default: "false"
  log_level:
    description: "Optional WORAI_LOG_LEVEL value (debug/info/warning/error)"
    required: false
    default: "warning"
  working_directory:
    description: "Directory where worai should run"
    required: false
    default: "."
  worai_version:
    description: "Pinned worai version to install"
    required: false
    default: "6.17.6"
  install_playwright:
    description: "Install Playwright Python package and browser binaries (true/false)"
    required: false
    default: "true"
  playwright_version:
    description: "Pinned Playwright Python package version to install"
    required: false
    default: "1.58.0"
  playwright_browser:
    description: "Playwright browser to install"
    required: false
    default: "chromium"
  cache_enabled:
    description: "Enable dependency cache for pip and Playwright browser binaries (true/false)"
    required: false
    default: "true"
  cache_key_suffix:
    description: "Optional cache key suffix; when empty, key is derived from worai/playwright versions and browser"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Resolve cache settings
      id: resolve_cache
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/resolve-cache-key.sh"
      env:
        INPUT_CACHE_ENABLED: ${{ inputs.cache_enabled }}
        INPUT_CACHE_KEY_SUFFIX: ${{ inputs.cache_key_suffix }}
        INPUT_WORAI_VERSION: ${{ inputs.worai_version }}
        INPUT_PLAYWRIGHT_VERSION: ${{ inputs.playwright_version }}
        INPUT_PLAYWRIGHT_BROWSER: ${{ inputs.playwright_browser }}

    - name: Cache pip and Playwright binaries
      if: ${{ steps.resolve_cache.outputs.cache_enabled == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/pip
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-graph-sync-${{ steps.resolve_cache.outputs.cache_key_suffix }}
        restore-keys: |
          ${{ runner.os }}-graph-sync-

    - name: Install worai
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/install-worai.sh"
      env:
        INPUT_WORAI_VERSION: ${{ inputs.worai_version }}

    - name: Install Playwright
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/install-playwright.sh"
      env:
        INPUT_INSTALL_PLAYWRIGHT: ${{ inputs.install_playwright }}
        INPUT_PLAYWRIGHT_VERSION: ${{ inputs.playwright_version }}
        INPUT_PLAYWRIGHT_BROWSER: ${{ inputs.playwright_browser }}

    - name: Run worai graph sync run
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/run-worai.sh"
      env:
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_DEBUG: ${{ inputs.debug }}
        INPUT_LOG_LEVEL: ${{ inputs.log_level }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
